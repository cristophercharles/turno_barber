<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Turnos Barber 💈</title>

<style>
:root{
    font-size: clamp(14px, 1.1vw, 26px);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Verdana;}
body{
    min-height:100vh;
    background:url("/static/images/barber_bg.jpg") no-repeat center/cover;
    color:#fff;
}
body::before{
    content:"";
    position:fixed;inset:0;
    background:rgba(0,0,0,.65);
    z-index:0;
}
.container{
    position:relative;z-index:1;
    max-width:90vw;
    margin:auto;
    padding:40px;
}

h1{font-size:3.8rem;margin-bottom:10px;}
.subtitle{font-size:1.9rem;opacity:.85;margin-bottom:30px;}

.fecha-hora-container{
    position:fixed;top:20px;right:30px;
    text-align:right;z-index:2;
}
.hora{font-size:3.2rem;font-weight:bold;}
.fecha{font-size:1.6rem;opacity:.85}

/* ===== TURNO ACTUAL ===== */
.turno-actual{
    background:linear-gradient(135deg,rgba(0,255,153,.35),rgba(0,100,70,.45));
    padding:40px;
    border-radius:22px;
    display:flex;
    gap:35px;
    align-items:center;
    margin-bottom:35px;
    box-shadow:0 0 30px rgba(0,255,153,.6);
}

.turno-actual img{
    width:140px;height:140px;
}

.turno-texto strong{
    font-size:3.4rem;
    display:block;
}

.turno-info{
    font-size:1.8rem;
    margin-top:12px;
    opacity:.95;
}

/* ===== BARRA PROGRESO ===== */
.barra-progreso{
    width:100%;
    height:10px;
    background:rgba(255,255,255,.2);
    border-radius:20px;
    overflow:hidden;
    margin-top:14px;
}
.barra-progreso-inner{
    height:100%;
    width:0%;
    background:#00ff99;
    transition:width 1s linear;
}

/* ===== PROXIMOS TURNOS ===== */
.section-title{font-size:2.4rem;margin:40px 0 20px;}

.sillas-container{
    display:grid;
    gap:30px;
}
.sillas-container.multiple{
    grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
}
.silla-columna h3{
    font-size:1.9rem;
    margin-bottom:15px;
}
.silla-columna ul{list-style:none}

.silla-columna li{
    background:linear-gradient(135deg,#1e7f43,#00ff99);
    padding:18px;
    border-radius:15px;
    margin-bottom:12px;
}

.turno-hora-grande{
    font-size:2rem;
    font-weight:bold;
}

.hora-turno{
    font-size:1.4rem;
    opacity:.95;
    margin-top:6px;
}

/* ===== TVs GRANDES ===== */
@media (min-width:1900px){
    .turno-actual img{
        width:180px;
        height:180px;
    }
}
</style>
</head>

<body>
<div class="fecha-hora-container">
    <div class="hora" id="hora"></div>
    <div class="fecha" id="fecha"></div>
</div>

<div class="container">
    <h1>✂️ Turnos en Atención</h1>
    <p class="subtitle">Los turnos se atienden por hora asignada</p>

    <section id="turnos-actuales"></section>

    <h2 class="section-title">📋 Próximos Turnos</h2>
    <div id="sillas-container" class="sillas-container"></div>
</div>

<script>
/* ================== SONIDO NUEVO TURNO ================== */
const sonidoNuevoTurno = new Audio("/static/sounds/plin.mp3");
sonidoNuevoTurno.volume = 0.6;

// guardar estado anterior
let turnosAnteriores = [];
let turnoAtendiendoAnterior = null;

// activar sonido con interacción (1 vez)
function activarSonido(){
    sonidoNuevoTurno.play().catch(()=>{});
}
document.addEventListener("click", activarSonido, { once:true });
/* ======================================================== */

/* ================== VOZ ================== */
function hablar(texto){
    if(!("speechSynthesis" in window)) return;

    const msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "es-ES";
    msg.rate = 0.95;
    msg.pitch = 1;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}
/* ======================================== */

function formato12h(h){
    const [d,m]=h.split(":").map(Number);
    const ampm=d>=12?"PM":"AM";
    const h12=d%12||12;
    return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}

function calcularRestante(turnoHora){
    const ahora = new Date();
    const [hh, mm] = turnoHora.split(":").map(Number);
    const turno = new Date();
    turno.setHours(hh, mm, 0, 0);
    const diff = Math.max(0, Math.floor((turno - ahora)/60000));
    return diff;
}

function formatoRestante(min){
    if(min<=0) return "En breve";
    const h=Math.floor(min/60);
    const m=min%60;
    if(h>0) return `Faltan ${h}h ${m}min`;
    return `Faltan ${m} min`;
}

function calcularPorcentaje(turnoHora, duracion){
    const ahora = new Date();
    const [hh, mm] = turnoHora.split(":").map(Number);
    const inicio = new Date();
    inicio.setHours(hh, mm, 0, 0);
    const transcurrido = Math.max(0, (ahora - inicio)/60000);
    let porcentaje = (transcurrido/duracion)*100;
    return Math.min(100, Math.max(0, porcentaje));
}

function actualizarHora(){
    const a=new Date();
    document.getElementById("hora").textContent=a.toLocaleTimeString("es-ES",{hour:"numeric",minute:"2-digit",hour12:true});
    document.getElementById("fecha").textContent=a.toLocaleDateString("es-ES",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
}
setInterval(actualizarHora,1000);
actualizarHora();

async function cargarTurnos(){
    const res = await fetch("http://127.0.0.1:8000/turnos/tv");
    if(!res.ok) return;

    const data = await res.json();

    /* ===== SONIDO NUEVO TURNO ===== */
    const turnosActuales = [
        ...data.actual,
        ...data.siguientes
    ].map(t => t.turno_id);

    if(turnosAnteriores.length > 0 && turnosActuales.length > turnosAnteriores.length){
        sonidoNuevoTurno.play().catch(()=>{});
    }
    turnosAnteriores = turnosActuales;
    /* ============================= */

    /* ===== VOZ NUEVO ATENDIENDO ===== */
    if(data.actual.length > 0){
        const turnoActual = data.actual[0];

        if(turnoAtendiendoAnterior !== turnoActual.turno_id){
            turnoAtendiendoAnterior = turnoActual.turno_id;

            hablar(`${turnoActual.cliente}, llegó tu turno. Puedes sentarte.`);
        }
    }
    /* ================================= */

    const actuales = document.getElementById("turnos-actuales");
    actuales.innerHTML = "";

    data.actual.forEach(t => {
        const restante = calcularRestante(t.hora);
        const porcentaje = calcularPorcentaje(t.hora, t.duracion || 30);

        const div = document.createElement("div");
        div.className = "turno-actual";
        div.innerHTML = `
            <img src="/static/images/barbero.png">
            <div class="turno-texto">
                <strong>🕒 ${formato12h(t.hora)}</strong>
                <div class="turno-info">
                    👤 ${t.cliente} | 💈 ${t.barbero} | Silla ${t.silla} | ${formatoRestante(restante)}
                </div>
                <div class="barra-progreso">
                    <div class="barra-progreso-inner" style="width:${porcentaje}%"></div>
                </div>
            </div>`;
        actuales.appendChild(div);
    });

    const cont = document.getElementById("sillas-container");
    cont.innerHTML = "";
    const map = {};

    data.siguientes.forEach(t => {
        map[t.barbero] = map[t.barbero] || [];
        map[t.barbero].push(t);
    });

    Object.keys(map).forEach(b => {
        const col = document.createElement("div");
        col.className = "silla-columna";
        col.innerHTML = `<h3>💈 ${b}</h3><ul></ul>`;
        const ul = col.querySelector("ul");

        map[b].forEach(t => {
            const restante = calcularRestante(t.hora);
            const li = document.createElement("li");
            li.innerHTML = `
                <div class="turno-hora-grande">🕒 ${formato12h(t.hora)}</div>
                <div class="hora-turno">
                    👤 ${t.cliente} | ${formatoRestante(restante)} | Silla ${t.silla}
                </div>`;
            ul.appendChild(li);
        });

        cont.appendChild(col);
    });

    cont.classList.toggle("multiple", Object.keys(map).length > 1);
}

setInterval(cargarTurnos,3000);
cargarTurnos();
</script>
</body>
</html>
